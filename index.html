<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy Study Lab</title>
</head>
<body>
<style>
html, body { height: 100%; width: 100%; }
body { display: flex; flex-direction: column; min-height: 100vh; }
.app { flex: 1; overflow: visible; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans, system-ui);
  background: #0B0B16;
  padding: 0;
}

.app {
  max-width: 780px; width: 100%;
  margin: 0 auto;
  background: #0B0B16;
  border-radius: 0;
  
  position: relative;
  color: #E8E6F0;
}

.app::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(127, 119, 221, 0.18), transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(212, 83, 126, 0.14), transparent 50%),
    radial-gradient(ellipse at 50% 60%, rgba(29, 158, 117, 0.06), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.inner { position: relative; z-index: 1; padding: 1.5rem 2rem; }

.hero {
  background: linear-gradient(135deg, rgba(60, 52, 137, 0.9), rgba(153, 53, 86, 0.75), rgba(216, 90, 48, 0.65));
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 18px;
  padding: 1.5rem 1.25rem;
  margin-bottom: 1.25rem;
  position: relative;
  
}

.hero::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  filter: blur(20px);
}

.hero-content { position: relative; z-index: 1; }

.hero-icons {
  display: flex;
  gap: 6px;
  margin-bottom: 0.875rem;
}

.hero-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.hero-icon svg { width: 16px; height: 16px; }

.hero-title {
  font-size: 24px;
  font-weight: 500;
  color: white;
  letter-spacing: -0.5px;
}

.hero-sub {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.85);
  margin: 4px 0 1rem;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.stat {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 10px;
  padding: 0.6rem 0.4rem;
  text-align: center;
}

.stat-num { font-size: 20px; font-weight: 500; color: white; display: block; }
.stat-label { font-size: 10px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; color: white; }

.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 1.25rem;
}

.tab {
  flex: 1;
  padding: 0.6rem 0.5rem;
  border: none;
  background: #0B0B16;
  color: rgba(232, 230, 240, 0.6);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.tab svg { width: 13px; height: 13px; }

.tab.active {
  background: linear-gradient(135deg, #7F77DD, #D4537E);
  color: white;
  box-shadow: 0 4px 14px rgba(127, 119, 221, 0.4);
}

.tab:hover:not(.active) {
  color: white;
  background: rgba(255, 255, 255, 0.06);
}

.panel { display: none; }
.panel.active { display: block; }

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.875rem;
}

.section-title { font-size: 16px; font-weight: 500; color: white; }

.pill {
  font-size: 11px;
  color: rgba(232, 230, 240, 0.7);
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 4px 10px;
  border-radius: 999px;
}

.systems-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
}

.sys-card {
  border-radius: 14px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  
  background: var(--bg);
  border: 1px solid var(--bd);
}

.sys-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 80px; height: 80px;
  background: var(--glow);
  border-radius: 50%;
  filter: blur(20px);
  opacity: 0.5;
}

.sys-card > * { position: relative; z-index: 1; }

.sys-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px var(--shadow);
}

.sys-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 14px var(--shadow);
}

.sys-icon svg { width: 22px; height: 22px; }

.sys-name { font-size: 14px; font-weight: 500; color: white; }
.sys-count { font-size: 12px; color: rgba(255, 255, 255, 0.65); margin-top: 2px; }

.list-item {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-left: 3px solid var(--ac, #7F77DD);
  border-radius: 10px;
  padding: 0.875rem 1rem;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.list-item:hover {
  background: rgba(255, 255, 255, 0.07);
  transform: translateX(4px);
  border-left-width: 5px;
}

.li-main { flex: 1; min-width: 0; }
.li-name { font-size: 14px; font-weight: 500; color: white; margin-bottom: 2px; }
.li-desc {
  font-size: 12px;
  color: rgba(232, 230, 240, 0.65);
  line-height: 1.5;
  
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.li-arrow { color: var(--ac, #7F77DD); font-size: 18px; }

.detail {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  
  margin-bottom: 1rem;
}

.banner {
  background: var(--bnr);
  padding: 1.5rem;
  position: relative;
  
}

.banner::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 130px; height: 130px;
  background: rgba(255, 255, 255, 0.12);
  border-radius: 50%;
}

.banner-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.75rem;
  position: relative;
  color: white;
}

.banner-icon svg { width: 24px; height: 24px; }

.banner-cat {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: 4px;
  position: relative;
  font-weight: 500;
}

.banner-name {
  font-size: 24px;
  font-weight: 500;
  color: white;
  position: relative;
}

.body { padding: 1.25rem 1.5rem; }

.row {
  padding: 0.875rem 0;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.row:first-child { border-top: none; padding-top: 0; }

.row-label {
  font-size: 11px;
  color: rgba(232, 230, 240, 0.55);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  font-weight: 500;
}

.row-val { font-size: 14px; line-height: 1.6; color: rgba(232, 230, 240, 0.95); }

.back {
  background: #0B0B16;
  border: none;
  color: rgba(232, 230, 240, 0.65);
  font-size: 13px;
  cursor: pointer;
  padding: 0.5rem 0;
  margin-bottom: 0.5rem;
  font-family: inherit;
}

.back:hover { color: white; }

.quiz-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  
}

.quiz-banner {
  background: linear-gradient(135deg, #1D9E75, #185FA5);
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  font-size: 12px;
}

.quiz-body { padding: 1.5rem; }

.quiz-prompt {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(232, 230, 240, 0.55);
  margin-bottom: 8px;
  font-weight: 500;
}

.quiz-clue {
  background: linear-gradient(135deg, rgba(127, 119, 221, 0.15), rgba(212, 83, 126, 0.12));
  border: 1px solid rgba(127, 119, 221, 0.25);
  border-radius: 10px;
  padding: 1.125rem 1.25rem;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 1rem;
  min-height: 80px;
  color: rgba(232, 230, 240, 0.95);
}

.quiz-meta {
  display: flex;
  gap: 6px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  font-weight: 500;
  border: 1px solid;
}

.tag-sys { background: rgba(127, 119, 221, 0.15); color: #AFA9EC; border-color: rgba(127, 119, 221, 0.3); }
.tag-loc { background: rgba(29, 158, 117, 0.15); color: #5DCAA5; border-color: rgba(29, 158, 117, 0.3); }

.input-row { display: flex; gap: 8px; margin-bottom: 1rem; }

.q-input {
  flex: 1;
  padding: 0.75rem 0.875rem;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  background: rgba(255, 255, 255, 0.04);
  color: white;
  transition: all 0.15s;
}

.q-input::placeholder { color: rgba(232, 230, 240, 0.4); }

.q-input:focus {
  outline: none;
  border-color: #7F77DD;
  background: rgba(127, 119, 221, 0.08);
  box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
}

.btn {
  padding: 0.75rem 1.25rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.04);
  color: white;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.btn:hover { background: rgba(255, 255, 255, 0.08); }
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, #7F77DD, #D4537E);
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(127, 119, 221, 0.35);
  color: white;
}

.btn-primary:hover {
  box-shadow: 0 6px 20px rgba(127, 119, 221, 0.5);
  transform: translateY(-1px);
  background: linear-gradient(135deg, #7F77DD, #D4537E);
}

.feedback {
  display: none;
  padding: 0.875rem 1rem;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 1rem;
  font-weight: 500;
  border: 1px solid;
}

.feedback.show { display: block; }

.feedback.ok {
  background: rgba(29, 158, 117, 0.15);
  color: #9FE1CB;
  border-color: rgba(29, 158, 117, 0.4);
}

.feedback.no {
  background: rgba(226, 75, 74, 0.15);
  color: #F7C1C1;
  border-color: rgba(226, 75, 74, 0.4);
}

.track {
  height: 6px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, #7F77DD, #D4537E, #D85A30);
  transition: width 0.4s;
  box-shadow: 0 0 12px rgba(212, 83, 126, 0.5);
}

.flashcard {
  background: linear-gradient(135deg, var(--c1), var(--c2));
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 14px;
  padding: 2rem 1.5rem;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  margin-bottom: 1rem;
  transition: all 0.25s;
  color: white;
  position: relative;
  
}

.flashcard::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  filter: blur(2px);
}

.flashcard::after {
  content: '';
  position: absolute;
  bottom: -50px; left: -50px;
  width: 180px; height: 180px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 50%;
  filter: blur(2px);
}

.flashcard > * { position: relative; z-index: 1; }

.flashcard:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
}

.fc-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
  color: white;
}

.fc-icon svg { width: 20px; height: 20px; }

.fc-cat {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: 0.9;
  margin-bottom: 0.875rem;
  font-weight: 500;
}

.fc-content {
  font-size: 26px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 1rem;
  max-width: 460px;
  letter-spacing: -0.3px;
}

.fc-content.answer {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  opacity: 0.95;
}

.fc-hint {
  font-size: 11px;
  opacity: 0.75;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.fc-controls { display: flex; gap: 8px; align-items: center; }
.fc-controls .btn { padding: 0.625rem 1rem; }
.fc-controls .track { flex: 1; }

.search-wrap { margin-bottom: 1rem; position: relative; }

.s-input {
  width: 100%;
  padding: 0.875rem 0.875rem 0.875rem 2.75rem;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.04);
  color: white;
  font-family: inherit;
  transition: all 0.15s;
}

.s-input::placeholder { color: rgba(232, 230, 240, 0.4); }

.s-input:focus {
  outline: none;
  border-color: #7F77DD;
  background: rgba(127, 119, 221, 0.08);
  box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
}

.s-icon {
  position: absolute;
  left: 0.875rem;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(232, 230, 240, 0.5);
}

.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: rgba(232, 230, 240, 0.5);
  font-size: 13px;
}

.filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }

.filter {
  font-size: 12px;
  padding: 6px 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.04);
  color: rgba(232, 230, 240, 0.7);
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  font-weight: 500;
}

.filter.active {
  background: linear-gradient(135deg, #7F77DD, #D4537E);
  color: white;
  border-color: transparent;
  box-shadow: 0 2px 10px rgba(127, 119, 221, 0.4);
}

.filter:hover:not(.active) {
  background: rgba(255, 255, 255, 0.08);
  color: white;
}

.complete {
  text-align: center;
  padding: 2.5rem 1.5rem;
  background: linear-gradient(135deg, #3C3489, #993556, #BA7517);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 14px;
  color: white;
  position: relative;
  
}

.complete::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  filter: blur(2px);
}

.complete > * { position: relative; z-index: 1; }
.complete-num { font-size: 56px; font-weight: 500; margin: 1rem 0 0.25rem; letter-spacing: -2px; }
.complete-label { font-size: 13px; opacity: 0.9; margin-bottom: 1.5rem; }
.complete-msg { font-size: 14px; margin-bottom: 1.5rem; opacity: 0.95; line-height: 1.5; max-width: 320px; margin-left: auto; margin-right: auto; }

.complete .btn { background: white; color: #3C3489; border: none; padding: 0.875rem 2rem; font-weight: 500; }
.complete .btn:hover { background: rgba(255, 255, 255, 0.95); }

.shuffle {
  background: linear-gradient(135deg, #1D9E75, #0F6E56);
  color: white;
  border: none;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 2px 10px rgba(29, 158, 117, 0.3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.shuffle svg { width: 12px; height: 12px; }

.shuffle:hover {
  box-shadow: 0 4px 14px rgba(29, 158, 117, 0.5);
  transform: translateY(-1px);
}

/* Review panel styles */
.review-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: rgba(232, 230, 240, 0.5);
  font-size: 13px;
  line-height: 1.6;
}

.review-empty .review-empty-icon {
  font-size: 36px;
  margin-bottom: 0.75rem;
}

.review-summary {
  background: linear-gradient(135deg, rgba(60, 52, 137, 0.5), rgba(153, 53, 86, 0.4));
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 1.5rem 2rem;
  margin-bottom: 1.25rem;
  display: flex;
  gap: 1rem;
  align-items: center;
}

.review-summary-icon {
  font-size: 32px;
  flex-shrink: 0;
}

.review-summary-text { flex: 1; }
.review-summary-title { font-size: 15px; font-weight: 500; color: white; margin-bottom: 3px; }
.review-summary-sub { font-size: 12px; color: rgba(232,230,240,0.7); line-height: 1.5; }

.review-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-left: 3px solid #D4537E;
  border-radius: 12px;
  margin-bottom: 10px;
  
}

.review-card-header {
  padding: 0.875rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  cursor: pointer;
  gap: 10px;
}

.review-card-header:hover { background: rgba(255,255,255,0.03); }

.review-card-name { font-size: 14px; font-weight: 500; color: white; margin-bottom: 2px; }
.review-card-sys {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(212, 83, 126, 0.15);
  color: #ED93B1;
  border: 1px solid rgba(212, 83, 126, 0.3);
  display: inline-block;
  margin-bottom: 4px;
}

.review-card-clue { font-size: 12px; color: rgba(232,230,240,0.6); line-height: 1.5; }

.review-chevron {
  color: rgba(232,230,240,0.4);
  font-size: 18px;
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-top: 2px;
}

.review-card.open .review-chevron { transform: rotate(90deg); }

.review-card-body {
  display: none;
  padding: 0 1rem 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.review-card.open .review-card-body { display: block; }

.review-row {
  padding: 0.625rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.review-row:last-child { border-bottom: none; padding-bottom: 0; }

.review-row-label {
  font-size: 10px;
  color: rgba(232,230,240,0.45);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 500;
  margin-bottom: 3px;
}

.review-row-val { font-size: 13px; color: rgba(232,230,240,0.9); line-height: 1.55; }

.review-tip {
  margin-top: 0.75rem;
  background: rgba(127, 119, 221, 0.1);
  border: 1px solid rgba(127, 119, 221, 0.2);
  border-radius: 8px;
  padding: 0.75rem;
}

.review-tip-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: #AFA9EC;
  font-weight: 600;
  margin-bottom: 4px;
}

.review-tip-text { font-size: 12px; color: rgba(232,230,240,0.85); line-height: 1.6; }

.review-actions {
  display: flex;
  gap: 8px;
  margin-top: 1.25rem;
}

.review-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 999px;

let all = [];
let qDeck = [], qIdx = 0, qCorrect = 0, qTotal = 0, qFilter = 'All';
let cDeck = [], cIdx = 0, cFlipped = false, cFilter = 'All';
let studied = new Set();
let missedItems = []; // tracks items missed this quiz round

function init() {
  Object.entries(A).forEach(([sys, d]) => {
    d.items.forEach(it => all.push({ ...it, sys, sd: d }));
  });
  document.getElementById('totalCount').textContent = all.length;
  document.getElementById('systemCount').textContent = Object.keys(A).length;
  renderSys();
  buildQF();
  buildCF();
  startQ();
  startC();
}

function renderSys() {
  document.getElementById('sysGrid').innerHTML = Object.entries(A).map(([n, d]) => `
    <div class="sys-card" onclick="openSys('${n}')" style="--bg:${d.bg};--bd:${d.bd};--accent:${d.accent};--glow:${d.glow};--shadow:${d.shadow};">
      <div class="sys-icon">${d.icon}</div>
      <div class="sys-name">${n}</div>
      <div class="sys-count">${d.items.length} structures</div>
    </div>
  `).join('');
}

function openSys(n) {
  const d = A[n];
  document.getElementById('bHome').style.display = 'none';
  document.getElementById('bDetail').style.display = 'none';
  const list = document.getElementById('bList');
  list.style.display = 'block';
  list.innerHTML = `
    <button class="back" onclick="closeSys()">← All systems</button>
    <div class="section-head">
      <div class="section-title">${n}</div>
      <span class="pill" style="color:${d.ac};border-color:${d.bd};">${d.items.length} structures</span>
    </div>
    ${d.items.map(it => `
      <div class="list-item" style="--ac:${d.ac};" onclick="openD('${it.name.replace(/'/g, "\'")}')">
        <div class="li-main">
          <div class="li-name">${it.name}</div>
          <div class="li-desc">${it.desc}</div>
        </div>
        <span class="li-arrow">›</span>
      </div>
    `).join('')}
  `;
}

function closeSys() {
  document.getElementById('bHome').style.display = 'block';
  document.getElementById('bList').style.display = 'none';
  document.getElementById('bDetail').style.display = 'none';
}

function openD(name) {
  const it = all.find(i => i.name === name);
  if (!it) return;
  studied.add(name); upd();
  document.getElementById('bHome').style.display = 'none';
  document.getElementById('bList').style.display = 'none';
  const d = document.getElementById('bDetail');
  d.style.display = 'block';
  d.innerHTML = `
    <button class="back" onclick="openSys('${it.sys}')">← ${it.sys}</button>
    <div class="detail">
      <div class="banner" style="--bnr:${it.sd.bnr};background:${it.sd.bnr};">
        <div class="banner-icon">${it.sd.icon}</div>
        <div class="banner-cat">${it.sys}</div>
        <div class="banner-name">${it.name}</div>
      </div>
      <div class="body">
        <div class="row"><div class="row-label">Description</div><div class="row-val">${it.desc}</div></div>
        <div class="row"><div class="row-label">Location</div><div class="row-val">${it.loc}</div></div>
        <div class="row"><div class="row-label">Function</div><div class="row-val">${it.fn}</div></div>
      </div>
    </div>
  `;
}

function buildQF() {
  document.getElementById('qFilters').innerHTML = ['All', ...Object.keys(A)].map(o =>
    `<button class="filter ${o === qFilter ? 'active' : ''}" onclick="setQF('${o}')">${o}</button>`
  ).join('');
}

function setQF(f) { qFilter = f; buildQF(); startQ(); }

function startQ() {
  const pool = qFilter === 'All' ? all : all.filter(i => i.sys === qFilter);
  qDeck = shuffle([...pool]).slice(0, Math.min(15, pool.length));
  qIdx = 0; qCorrect = 0; qTotal = 0;
  missedItems = [];
  qSubmitted = false;
  renderQ();
}

function renderQ() {
  const m = document.getElementById('qMain');
  if (qIdx >= qDeck.length) {
    const acc = qTotal > 0 ? Math.round((qCorrect / qTotal) * 100) : 0;
    let msg = acc === 100 ? 'Perfect score. Outstanding work.' :
              acc >= 80 ? 'Excellent. You know this material well.' :
              acc >= 60 ? 'Good progress. Review the misses and try again.' :
              'Keep going. Repetition is how anatomy sticks.';
    const hasReview = missedItems.length > 0;
    m.innerHTML = `
      <div class="complete">
        <div class="complete-label">Round complete</div>
        <div class="complete-num">${qCorrect}/${qTotal}</div>
        <div class="complete-label">${acc}% accuracy</div>
        <div class="complete-msg">${msg}</div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="btn" onclick="startQ()" style="background:white;color:#3C3489;border:none;padding:0.875rem 2rem;font-weight:500;">New round</button>
          ${hasReview ? `<button class="btn" onclick="goToReview()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);padding:0.875rem 2rem;font-weight:500;">Review ${missedItems.length} missed →</button>` : ''}
        </div>
      </div>
    `;
    if (hasReview) buildReview();
    return;
  }
  const it = qDeck[qIdx];
  const acc = qTotal > 0 ? Math.round((qCorrect / qTotal) * 100) : 0;
  m.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-banner">
        <span>Question ${qIdx + 1} of ${qDeck.length}</span>
        <span>Score <strong>${qCorrect}/${qTotal}</strong> · ${qTotal > 0 ? acc + '%' : '—'}</span>
      </div>
      <div class="quiz-body">
        <div class="quiz-prompt">Identify this structure</div>
        <div class="quiz-clue">${it.desc}</div>
        <div class="quiz-meta">
          <span class="tag tag-sys">${it.sys}</span>
          <span class="tag tag-loc">${it.loc}</span>
        </div>
        <div class="feedback" id="qFb"></div>
        <div class="input-row">
          <input type="text" class="q-input" id="qIn" placeholder="Your answer..." autocomplete="off">
          <button class="btn btn-primary" onclick="sub()">Submit</button>
        </div>
        <div class="track"><div class="fill" style="width:${(qIdx / qDeck.length) * 100}%"></div></div>
      </div>
    </div>
  `;
  const inp = document.getElementById('qIn');
  inp.focus();
  inp.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); inp.removeEventListener('keydown', onKey); sub(); }
  }, { once: false });
}

let qSubmitted = false;

function sub() {
  if (qSubmitted) return;
  qSubmitted = true;
  const inp = document.getElementById('qIn');
  const fb = document.getElementById('qFb');
  const it = qDeck[qIdx];
  const a = inp.value.trim().toLowerCase();
  const c = it.name.toLowerCase();
  const ok = a === c || close(a, c);
  qTotal++;
  studied.add(it.name); upd();
  if (ok) {
    qCorrect++;
    fb.className = 'feedback ok show';
    fb.innerHTML = `Correct. The answer is ${it.name}.`;
  } else {
    fb.className = 'feedback no show';
    fb.innerHTML = `Not quite. The answer is ${it.name}.`;
    if (!missedItems.find(m => m.name === it.name)) missedItems.push(it);
  }
  document.getElementById('accuracyStat').textContent = Math.round((qCorrect / qTotal) * 100) + '%';
  inp.disabled = true;
  // Show a Next button instead of auto-advancing
  const inputRow = inp.closest('.input-row');
  inputRow.innerHTML = `<button class="btn btn-primary" style="width:100%;" id="nextBtn" onclick="nextQ()">Next →</button>`;
  document.getElementById('nextBtn').focus();
  document.addEventListener('keydown', function onEnterNext(e) {
    if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); document.removeEventListener('keydown', onEnterNext); nextQ(); }
  });
}

function nextQ() {
  qIdx++;
  qSubmitted = false;
  renderQ();
}

function close(a, b) {
  if (Math.abs(a.length - b.length) > 2) return false;
  let d = 0;
  for (let i = 0; i < Math.max(a.length, b.length); i++) if (a[i] !== b[i]) d++;
  return d <= 1;
}

function buildCF() {
  document.getElementById('cFilters').innerHTML = ['All', ...Object.keys(A)].map(o =>
    `<button class="filter ${o === cFilter ? 'active' : ''}" onclick="setCF('${o}')">${o}</button>`
  ).join('');
}

function setCF(f) { cFilter = f; buildCF(); startC(); }

function startC() {
  const pool = cFilter === 'All' ? all : all.filter(i => i.sys === cFilter);
  cDeck = shuffle([...pool]);
  cIdx = 0; cFlipped = false;
  show();
}

function show() {
  if (!cDeck.length) return;
  const it = cDeck[cIdx];
  const fc = document.getElementById('fc');
  fc.style.setProperty('--c1', it.sd.c1);
  fc.style.setProperty('--c2', it.sd.c2);
  document.getElementById('fcIcon').innerHTML = it.sd.icon;
  document.getElementById('fcCat').textContent = it.sys;
  document.getElementById('fcContent').textContent = it.name;
  document.getElementById('fcContent').classList.remove('answer');
  document.getElementById('fcHint').textContent = 'Tap to reveal';
  document.getElementById('cProg').textContent = `Card ${cIdx + 1} of ${cDeck.length}`;
  document.getElementById('cFill').style.width = ((cIdx + 1) / cDeck.length) * 100 + '%';
  cFlipped = false;
}

function flip() {
  const it = cDeck[cIdx];
  cFlipped = !cFlipped;
  if (cFlipped) {
    studied.add(it.name); upd();
    document.getElementById('fcContent').textContent = it.desc;
    document.getElementById('fcContent').classList.add('answer');
    document.getElementById('fcHint').textContent = `${it.loc} · ${it.fn}`;
  } else {
    document.getElementById('fcContent').textContent = it.name;
    document.getElementById('fcContent').classList.remove('answer');
    document.getElementById('fcHint').textContent = 'Tap to reveal';
  }
}

function next() { cIdx = (cIdx + 1) % cDeck.length; show(); }
function prev() { cIdx = (cIdx - 1 + cDeck.length) % cDeck.length; show(); }
function shuf() { cDeck = shuffle([...cDeck]); cIdx = 0; show(); }

function srch() {
  const q = document.getElementById('sInput').value.trim().toLowerCase();
  const r = document.getElementById('sResults');
  if (!q) { r.innerHTML = '<div class="empty">Start typing to search across all systems.</div>'; return; }
  const m = all.filter(it =>
    it.name.toLowerCase().includes(q) ||
    it.desc.toLowerCase().includes(q) ||
    it.loc.toLowerCase().includes(q) ||
    it.fn.toLowerCase().includes(q)
  );
  if (!m.length) { r.innerHTML = '<div class="empty">No structures match your search.</div>'; return; }
  r.innerHTML = `
    <div class="section-head"><span class="pill">${m.length} result${m.length === 1 ? '' : 's'}</span></div>
    ${m.map(it => `
      <div class="list-item" style="--ac:${it.sd.ac};" onclick="sOpen('${it.name.replace(/'/g, "\'")}')">
        <div class="li-main">
          <div class="li-name">${it.name}</div>
          <div style="font-size:11px;color:${it.sd.ac};margin-bottom:4px;font-weight:500;">${it.sys}</div>
          <div class="li-desc">${it.desc}</div>
        </div>
        <span class="li-arrow">›</span>
      </div>
    `).join('')}
  `;
}

function sOpen(name) { document.querySelector('[data-tab="browse"]').click(); openD(name); }

function goToReview() {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.getElementById('reviewTab').classList.add('active');
  document.getElementById('review').classList.add('active');
}

function getMnemonic(it) {
  const tips = {
    // Location-based tips
    'Upper arm': `Picture the ${it.name} by thinking of your upper arm — it sits between your shoulder and elbow.`,
    'Thigh': `The ${it.name} runs the length of your thigh. It's the bone you'd feel if you pressed deep into the top of your leg.`,
    'Lower leg (medial)': `The ${it.name} (shinbone) is on the inside of your lower leg — you can feel it right under the skin at the front.`,
    'Anterior chest': `Anything at the anterior chest is up front, center. Think of what you'd touch if you placed your hand on your chest.`,
    'Posterior thorax': `"Posterior" = behind, "thorax" = chest area. The ${it.name} is in your back, running from throat to stomach.`,
    'Upper back': `The ${it.name} spans your upper back. Reach behind your neck and you're near it.`,
  };
  // Function-based keyword tips
  if (it.fn.toLowerCase().includes('pump') || it.fn.toLowerCase().includes('circulation')) {
    return `Focus on the word "pump" — the ${it.name}'s job is keeping blood moving. Link the name to the action of pumping.`;
  }
  if (it.fn.toLowerCase().includes('gas exchange') || it.fn.toLowerCase().includes('respiration')) {
    return `Think "in with oxygen, out with CO₂." The ${it.name} is where this swap happens. Visualize tiny balloons inflating and deflating.`;
  }
  if (it.fn.toLowerCase().includes('filtration') || it.fn.toLowerCase().includes('urine')) {
    return `The ${it.name} is a filter — imagine it as a coffee filter cleaning your blood. What passes through becomes urine.`;
  }
  if (it.fn.toLowerCase().includes('hormone') || it.fn.toLowerCase().includes('regulation')) {
    return `The ${it.name} controls chemical messengers (hormones). Think of it as a radio tower broadcasting signals to the rest of the body.`;
  }
  if (it.fn.toLowerCase().includes('flexion') || it.fn.toLowerCase().includes('extension')) {
    return `Muscle memory trick: flex your ${it.loc.toLowerCase()} and feel it contract — that's the ${it.name} working. Extension is the opposite motion.`;
  }
  if (it.fn.toLowerCase().includes('absorption')) {
    return `The ${it.name} absorbs nutrients. Picture millions of tiny fingers (villi) lining the inside, grabbing nutrients as food passes by.`;
  }
  if (it.fn.toLowerCase().includes('protect') || it.fn.toLowerCase().includes('protection')) {
    return `The ${it.name}'s role is protection. Think of it as armor — it shields whatever is behind or inside it.`;
  }
  // Location fallback
  if (tips[it.loc]) return tips[it.loc];
  // Generic fallback
  return `Break the name down: say "${it.name}" out loud a few times while pointing to its location (${it.loc}). Pairing the sound with the place helps it stick.`;
}

function buildReview() {
  const el = document.getElementById('reviewContent');
  if (!missedItems.length) {
    el.innerHTML = `
      <div class="review-empty">
        <div class="review-empty-icon">🎯</div>
        <div>No missed questions yet.</div>
        <div style="margin-top:6px;font-size:12px;">Complete a quiz round and any misses will appear here.</div>
      </div>`;
    return;
  }
  const bySystem = {};
  missedItems.forEach(it => {
    if (!bySystem[it.sys]) bySystem[it.sys] = [];
    bySystem[it.sys].push(it);
  });
  const systemList = Object.keys(bySystem);
  el.innerHTML = `
    <div class="review-summary">
      <div class="review-summary-icon">📋</div>
      <div class="review-summary-text">
        <div class="review-summary-title">You missed ${missedItems.length} structure${missedItems.length > 1 ? 's' : ''}</div>
        <div class="review-summary-sub">Across ${systemList.length} system${systemList.length > 1 ? 's' : ''}: ${systemList.join(', ')}. Tap each card to see the full details and a memory tip.</div>
      </div>
    </div>
    <div class="section-head" style="margin-bottom:0.75rem;">
      <div class="section-title">Missed structures</div>
      <span class="review-badge badge-missed">✗ ${missedItems.length} missed</span>
    </div>
    ${missedItems.map((it, i) => `
      <div class="review-card" id="rc-${i}">
        <div class="review-card-header" onclick="toggleReviewCard(${i})">
          <div style="flex:1;min-width:0;">
            <div class="review-card-name">${it.name}</div>
            <span class="review-card-sys">${it.sys}</span>
            <div class="review-card-clue">${it.desc}</div>
          </div>
          <span class="review-chevron">›</span>
        </div>
        <div class="review-card-body">
          <div class="review-row">
            <div class="review-row-label">Location</div>
            <div class="review-row-val">${it.loc}</div>
          </div>
          <div class="review-row">
            <div class="review-row-label">Function</div>
            <div class="review-row-val">${it.fn}</div>
          </div>
          <div class="review-tip">
            <div class="review-tip-label">💡 Memory tip</div>
            <div class="review-tip-text">${getMnemonic(it)}</div>
          </div>
        </div>
      </div>
    `).join('')}
    <div class="review-actions">
      <button class="btn btn-primary" onclick="startQ();goToQuiz()">Retry quiz</button>
      <button class="btn" onclick="retryMissed()">Quiz only missed (${missedItems.length})</button>
    </div>
  `;
}

function toggleReviewCard(i) {
  const card = document.getElementById('rc-' + i);
  card.classList.toggle('open');
}

function goToQuiz() {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="quiz"]').classList.add('active');
  document.getElementById('quiz').classList.add('active');
}

function retryMissed() {
  if (!missedItems.length) return;
  const saved = [...missedItems];
  qDeck = shuffle([...saved]);
  qIdx = 0; qCorrect = 0; qTotal = 0;
  missedItems = [];
  renderQ();
  goToQuiz();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function upd() { document.getElementById('studiedCount').textContent = studied.size; }

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

document.getElementById('sResults').innerHTML = '<div class="empty">Start typing to search across all systems.</div>';

buildReview();
init();
</script>
